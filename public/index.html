    <!--
      Canonical:
      - CRA serves this same HTML for multiple SPA routes (/careers, /pilot, etc).
      - A static canonical here would incorrectly canonicalize every route to "/".
      - Instead, inject the canonical dynamically for JS-capable crawlers/browsers.
      - Special-case /lite (audit-only) to canonicalize back to "/".
    -->
    <script>
      (function () {
        try {
          var url = new URL(window.location.href);
          url.hash = "";
          if (url.pathname === "/lite" || url.pathname.indexOf("/lite/") === 0) {
            url.pathname = "/";
            url.search = "";
          }
          var link = document.createElement("link");
          link.rel = "canonical";
          link.href = url.toString();
          document.head.appendChild(link);
        } catch (e) {
          // ignore
        }
      })();
    </script>
